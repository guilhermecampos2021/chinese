<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards Chinês</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f0f4ff, #dbeafe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      text-align: center;
    }

    .card {
      width: 420px;
      height: 240px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 54px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.3s ease;
      user-select: none;
      padding: 20px;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .buttons {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      transition: background 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    .info {
      margin-top: 15px;
      color: #444;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="card">
      你好
    </div>

    <div class="buttons">
      <button onclick="previousCard()">⬅ Anterior</button>
      <button onclick="nextCard()">Próximo ➡</button>
    </div>

    <div class="info">
      Clique no card para revelar as informações.
    </div>
  </div>

  <script>

      {

    traducao: "call/take a taxi"
},
{
    hanzi: "坐火车",
    pinyin: "zuò huǒchē",
    traducao: "take the train 🚆"
},
{
    hanzi: "坐飞机",
    pinyin: "zuò fēijī",
    traducao: "take the airplane ✈"
},
      {
    hanzi: "一起睡觉",
    pinyin: "yìqǐ shuìjiào",
    traducao: "sleep together"
},
{
    hanzi: "一起做饭",
    pinyin: "yìqǐ zuòfàn",
    traducao: "cook together"
},
{
    hanzi: "一起弹钢琴",
    pinyin: "yìqǐ tán gāngqín",
    traducao: "play the piano together 🎹"
},
{
    hanzi: "爸爸和孩子们一起看书",
    pinyin: "bàba hé háizimen yìqǐ kànshū",
    traducao: "the father and the children read together"
},
{
    hanzi: "一起吃饭",
    pinyin: "yìqǐ chīfàn",
    traducao: "eat together"
},
{
    hanzi: "一起买衣服",
    pinyin: "yìqǐ mǎi yīfu",
    traducao: "buy clothes together"
},
{
    hanzi: "在睡觉",
    pinyin: "zài shuìjiào",
    traducao: "sleeping"
},
{
    hanzi: "在打电话",
    pinyin: "zài dǎ diànhuà",
    traducao: "talking on the phone"
},
{
    hanzi: "在做饭",
    pinyin: "zài zuòfàn",
    traducao: "cooking"
},
{
    hanzi: "在学习",
    pinyin: "zài xuéxí",
    traducao: "studying"
},
{
    hanzi: "在看书",
    pinyin: "zài kànshū",
    traducao: "reading a book"
}, 

      {
    hanzi: "你们是怎么来饭店的?",
    pinyin: "Nǐmen shì zěnme lái fàndiàn de?",
    traducao: "How did you come to the hotel?"
},
{
    hanzi: "我们是坐出租车来的。",
    pinyin: "Wǒmen shì zuò chūzūchē lái de.",
    traducao: "We came by taxi."
},
{
    hanzi: "李先生呢?",
    pinyin: "Lǐ xiānsheng ne?",
    traducao: "What about Mr. Li?"
},
{
    hanzi: "他是和朋友一起开车来的。",
    pinyin: "Tā shì hé péngyou yìqǐ kāichē lái de.",
    traducao: "He came driving together with a friend."
},

      {
    hanzi: "晚上你是和谁一起吃饭的?",
    pinyin: "Wǎnshang nǐ shì hé shéi yìqǐ chīfàn de?",
    traducao: "Who did you have dinner with at night?"
},
{
    hanzi: "晚上我是和妈妈、弟弟一起吃饭的。",
    pinyin: "Wǎnshang wǒ shì hé māma, dìdi yìqǐ chīfàn de.",
    traducao: "At night I ate together with my mother and younger brother."
},
     {
    hanzi: "你好",
    pinyin: "nǐ hǎo",
    traducao: "Olá"
},
{
    hanzi: "晚上好",
    pinyin: "wǎn shàng hǎo",
    traducao: "Good Evening"
},
{
    hanzi: "早上好!",
    pinyin: "zǎo shàng hǎo",
    traducao: "Good Morning"
},
{
    hanzi: "你叫什么名字?",
    pinyin: "nǐ jiào shénme míngzi",
    traducao: "What's your name"
},
{
    hanzi: "钟",
    pinyin: "zhōng",
    traducao: "clock"
},
{
    hanzi: "火车",
    pinyin: "huǒ chē",
    traducao: "train"
},
{
    hanzi: "沙漠",
    pinyin: "shā mò",
    traducao: "desert"
},
{
    hanzi: "坐",
    pinyin: "zuò",
    traducao: "sit"
},
{
    hanzi: "你住在哪儿",
    pinyin: "nǐ zhù zài nǎr",
    traducao: "Where do you live?"
},
{
    hanzi: "我住在巴西。",
    pinyin: "wǒ zhù zài Bāxī",
    traducao: "I live in Brazil"
},
{
    hanzi: "听",
    pinyin: "tīng",
    traducao: "listen"
},
{
    hanzi: "日",
    pinyin: "rì",
    traducao: "The Sun"
},
{
    hanzi: "写字",
    pinyin: "xiě zì",
    traducao: "writing"
},
{
    hanzi: "月亮",
    pinyin: "yuèliang",
    traducao: "moon"
},
{
    hanzi: "云",
    pinyin: "yún",
    traducao: "cloud"
},
{
    hanzi: "水杯",
    pinyin: "shuǐ bēi",
    traducao: "cup"
},
{
    hanzi: "小猫",
    pinyin: "xiǎo māo",
    traducao: "kitten"
},
{
    hanzi: "足球",
    pinyin: "zúqiú",
    traducao: "football"
},
{
    hanzi: "海鸥",
    pinyin: "hǎi ōu",
    traducao: "seagull"
},
{
    hanzi: "饭店",
    pinyin: "fàndiàn",
    traducao: "Hotel"
},
{
    hanzi: "衣服",
    pinyin: "yīfu",
    traducao: "Clothes"
},
{
    hanzi: "桌子上",
    pinyin: "zhuōzi shàng",
    traducao: "On the table"
},
{
    hanzi: "谢谢",
    pinyin: "xièxie",
    traducao: "Obrigado"
},
{
    hanzi: "水",
    pinyin: "shuǐ",
    traducao: "Água"
},
{
    hanzi: "学校",
    pinyin: "xuéxiào",
    traducao: "Escola"
},
{
    hanzi: "中国",
    pinyin: "Zhōngguó",
    traducao: "China"
}
    ];

    let currentIndex = 0;
    let stage = 0;

    const card = document.getElementById("card");

    function updateCard() {
      const current = flashcards[currentIndex];

      if (stage === 0) {
        card.innerHTML = current.hanzi;
        card.style.fontSize = "54px";
      } else if (stage === 1) {
        card.innerHTML = current.pinyin;
        card.style.fontSize = "42px";
      } else {
        card.innerHTML = current.traducao;
        card.style.fontSize = "42px";
      }
    }

    card.addEventListener("click", () => {
      stage = (stage + 1) % 3;
      updateCard();
    });

    function nextCard() {
      currentIndex = (currentIndex + 1) % flashcards.length;
      stage = 0;
      updateCard();
    }

    function previousCard() {
      currentIndex = (currentIndex - 1 + flashcards.length) % flashcards.length;
      stage = 0;
      updateCard();
    }

    updateCard();
  </script>
</body>
</html>
